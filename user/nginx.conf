server {
    listen 8080;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Shared security headers to be used across all locations
    # add_header Content-Security-Policy "frame-ancestors 'self' https://*.gohighlevel.com https://*.msgsndr.com https://*.leadconnectorhq.com https://*.ghl-crm.com https://*.app.gohighlevel.com;" always;
    # add_header X-Content-Type-Options "nosniff" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        add_header Content-Security-Policy "frame-ancestors 'self' https://*.gohighlevel.com https://*.msgsndr.com https://*.leadconnectorhq.com https://*.ghl-crm.com https://*.nolacrm.io https://*.app.gohighlevel.com;" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        try_files $uri $uri/ /index.html;
    }

    location /api/ {
        proxy_pass https://smspro-api.nolacrm.io/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host smspro-api.nolacrm.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Webhook-Secret "f7RkQ2pL9zV3tX8cB1nS4yW6";
        proxy_pass_request_headers on;
        
        # Specific rerouting mapping via nginx matches previous vite.config
        rewrite ^/api/contacts(.*) /api/ghl-contacts$1 break;
        if ($request_method ~* "(PUT|DELETE)") {
            rewrite ^/api/messages(.*) /api/conversations$1 break;
        }

        add_header Content-Security-Policy "frame-ancestors 'self' https://*.gohighlevel.com https://*.msgsndr.com https://*.leadconnectorhq.com https://*.ghl-crm.com https://*.nolacrm.io https://*.app.gohighlevel.com;" always;
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'X-Webhook-Secret,Content-Type,X-GHL-Location-ID,Authorization' always;
    }

    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Content-Security-Policy "frame-ancestors 'self' https://*.gohighlevel.com https://*.msgsndr.com https://*.leadconnectorhq.com https://*.ghl-crm.com https://*.nolacrm.io https://*.app.gohighlevel.com;" always;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
