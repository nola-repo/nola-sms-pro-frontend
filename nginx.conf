server {
    listen 8080;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Proxy /api/* to the backend (server-side, no CORS)
    location /api/ {
        proxy_pass https://smspro-api.nolacrm.io/api/;
        proxy_ssl_server_name on;
        proxy_set_header Host smspro-api.nolacrm.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Inject the secret required by the backend
        proxy_set_header X-Webhook-Secret "f7RkQ2pL9zV3tX8cB1nS4yW6";
        
        # Pass auth header from the frontend if present (e.g. X-GHL-Location-ID)
        proxy_pass_request_headers on;

        # Ensure CORS is handled if ever needed (robustness)
        add_header 'Access-Control-Allow-Origin' '*' always;
        add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS, PUT, DELETE' always;
        add_header 'Access-Control-Allow-Headers' 'X-Webhook-Secret,Content-Type,X-GHL-Location-ID' always;
    }

    # Proxy /webhook/* to the backend
    location /webhook/ {
        proxy_pass https://smspro-api.nolacrm.io/webhook/;
        proxy_ssl_server_name on;
        proxy_set_header Host smspro-api.nolacrm.io;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Inject the secret required by the backend
        proxy_set_header X-Webhook-Secret "f7RkQ2pL9zV3tX8cB1nS4yW6";

        proxy_pass_request_headers on;
    }

    # SPA fallback: serve index.html for all unmatched routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
